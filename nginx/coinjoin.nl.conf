server {
    listen        80;
    listen        [::]:80;
    listen        443 ssl;
    listen        [::]:443 ssl;
    server_name coinjoin.nl;
    access_log /var/log/nginx/reverse-access.log;
    error_log /var/log/nginx/reverse-error.log;

    root /var/www/coinjoin;
    index index.html;

    location /wabisabi {
    proxy_pass http://localhost:5000; #37128;
    }

    location /wabisabi/status {
    proxy_pass http://localhost:5000;
    }

    location /wasabi/human-monitor {
    proxy_pass http://localhost:5000;
    }

    # Self-hosted am-i.exposed transaction viewer (static export).
    # ^~ ensures this prefix wins over the redirecting "location /" below.
    location ^~ /viewer/ {
        root /var/www/coinjoin;
        try_files $uri $uri/ /viewer/index.html;
    }

    # The viewer app references these public assets with root-absolute paths
    # (not rewritten by Next.js basePath), so serve them from the viewer dir.
    location ^~ /workers/ { root /var/www/coinjoin/viewer; }
    location ^~ /wasm/    { root /var/www/coinjoin/viewer; }
    location ^~ /data/    { root /var/www/coinjoin/viewer; }
    location ^~ /locales/ { root /var/www/coinjoin/viewer; }

    # Self-hosted webfonts (index.html @font-face), else "location /" 301s them away.
    location ^~ /fonts/ { root /var/www/coinjoin; }

    # Latest successful coinjoin txid, published by coinjoin-latest-txid.sh.
    location = /latest-coinjoin.json {
        root /var/www/coinjoin;
        default_type application/json;
        add_header Cache-Control "no-store";
    }

    # txflow.py animation of the latest round, rendered by coinjoin-latest-txid.sh.
    location = /latest.html {
        root /var/www/coinjoin;
        add_header Cache-Control "no-store";
    }

    # `coinjoin-stats.py latest` text dump, written by the wasabi-coinjoin-latest service.
    location = /latest-stats.txt {
        root /var/www/coinjoin;
        default_type text/plain;
        add_header Cache-Control "no-store";
    }

    location / {
	# Browser is redirected to info page.
        if ( $http_user_agent != "" ) {
		return 301 https://coinjoin.nl/index.html;
	}
	# Wallets are redirected to coordinator server.
	# proxy_pass http://localhost:37128; for v2.5.4, now listens by default to port 5000
	proxy_pass http://localhost:5000;
        proxy_redirect off;
        proxy_set_header Host $http_host;
    }

    location = /index.html {
        root /var/www/coinjoin;
        index index.html;
    }

    location @fallback {
        return 301 https://coinjoin.nl/index.html;
	internal;
    }

    ssl_certificate /etc/letsencrypt/live/coinjoin.nl/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/coinjoin.nl/privkey.pem;
}
